name: Validar aplicação

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      SUPABASE_SERVICE_ROLE_KEY: sb_secret_ci_placeholder
      MERCADO_PAGO_ACCESS_TOKEN: APP_USR-ci-placeholder
      MERCADO_PAGO_WEBHOOK_SECRET: ci-placeholder
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Verificar tipos
        run: npm exec tsc -- --noEmit

      - name: Executar lint
        run: npm run lint

      - name: Gerar build
        run: npm run build
