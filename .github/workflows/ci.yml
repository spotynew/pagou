name: Validar aplicação

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      SUPABASE_SERVICE_ROLE_KEY: sb_secret_ci_placeholder
      MERCADO_PAGO_ACCESS_TOKEN: APP_USR-ci-placeholder
      MERCADO_PAGO_WEBHOOK_SECRET: ci-placeholder
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          show-progress: false
          persist-credentials: false

      - name: Instalar dependências
        run: npm install --legacy-peer-deps --no-audit --no-fund --loglevel=error

      - name: Verificar tipos
        run: npm exec tsc -- --noEmit

      - name: Gerar relatório de lint
        id: lint
        shell: bash
        run: |
          set +e
          npm exec eslint -- \
            src/lib/checkout.functions.ts \
            src/lib/mercadopago.server.ts \
            src/lib/pricing.ts \
            src/lib/producer.functions.ts \
            src/lib/public-event.functions.ts \
            src/lib/queries.ts \
            src/routes/_authenticated/produtor.eventos.tsx \
            'src/routes/eventos.$slug.tsx' \
            > lint-report.txt 2>&1
          status=$?
          cat lint-report.txt
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Salvar relatório de lint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.txt
          if-no-files-found: error
          retention-days: 3

      - name: Confirmar lint
        if: steps.lint.outputs.exit_code != '0'
        run: exit 1

      - name: Gerar build
        run: npm run build
